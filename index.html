<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修正チェックツール | becky lash tokyo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    color: #1a1a2e; background: #fff; min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

  /* ===== LOGIN ===== */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fafafa;
  }
  .login-box {
    width: 100%; max-width: 380px; padding: 32px; background: #fff;
    border-radius: 14px; box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }
  .login-box .brand { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #9ca3af; margin-bottom: 8px; text-align: center; }
  .login-box h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; text-align: center; margin-bottom: 4px; }
  .login-box .sub { font-size: 13px; color: #9ca3af; text-align: center; margin-bottom: 24px; }
  .login-input {
    width: 100%; padding: 12px 14px; border-radius: 10px; border: 1.5px solid #d1d5db;
    font-size: 14px; outline: none; transition: border-color 0.2s; margin-bottom: 12px;
  }
  .login-input:focus { border-color: #1a1a2e; }
  .login-btn {
    width: 100%; padding: 13px; border-radius: 10px; border: none;
    background: #1a1a2e; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .login-btn:hover { background: #2a2a4e; }
  .login-error {
    padding: 8px 12px; border-radius: 8px; background: #fef2f2;
    color: #dc2626; font-size: 12px; margin-bottom: 12px; display: none;
  }

  /* ===== MAIN ===== */
  .main-screen { display: none; }
  .header { text-align: center; margin-bottom: 32px; padding: 20px 0; border-bottom: 2px solid #e8e8ef; position: relative; }
  .header-brand { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #9ca3af; margin-bottom: 8px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header p { font-size: 13px; color: #6b7280; margin-top: 6px; }
  .logout-btn {
    position: absolute; right: 0; top: 20px; padding: 6px 14px;
    border-radius: 8px; border: 1px solid #d1d5db; background: #fff;
    color: #9ca3af; font-size: 12px; cursor: pointer;
  }
  .logout-btn:hover { background: #f9fafb; }

  .step-label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    background: #1a1a2e; color: #fff; font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .message-input {
    width: 100%; padding: 14px; border-radius: 10px; border: 1.5px solid #d1d5db;
    font-size: 14px; line-height: 1.7; resize: vertical; outline: none;
    transition: border-color 0.2s; background: #fafafa; font-family: inherit;
  }
  .message-input:focus { border-color: #1a1a2e; }

  .upload-area {
    border: 2px dashed #d1d5db; border-radius: 10px; padding: 28px 16px;
    text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa;
  }
  .upload-area:hover { border-color: #1a1a2e; background: #f3f3f8; }
  .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .upload-text { font-size: 13px; color: #6b7280; }

  .thumbs { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .thumb-wrap { position: relative; }
  .thumb-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #e5e7eb; }
  .thumb-remove {
    position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
    border-radius: 50%; background: #ef4444; color: #fff; border: none;
    font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .thumb-label { font-size: 10px; color: #9ca3af; text-align: center; margin-top: 2px; }

  .error-box { padding: 10px 14px; border-radius: 8px; background: #fef2f2; color: #dc2626; font-size: 13px; margin-bottom: 16px; display: none; }

  .actions { display: flex; gap: 10px; margin-bottom: 32px; }
  .btn-check {
    flex: 1; padding: 14px 20px; border-radius: 10px; border: none;
    background: #1a1a2e; color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s;
  }
  .btn-check:hover { background: #2a2a4e; }
  .btn-check:disabled { background: #9ca3af; cursor: not-allowed; }
  .btn-reset {
    padding: 14px 20px; border-radius: 10px; border: 1.5px solid #d1d5db;
    background: #fff; color: #6b7280; font-size: 14px; cursor: pointer;
  }
  .btn-reset:hover { background: #f9fafb; }

  .loading { text-align: center; padding: 40px 0; color: #6b7280; display: none; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #1a1a2e;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: none; }
  .summary-bar { display: flex; gap: 12px; padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; align-items: center; }
  .summary-bar.ok { background: #f0fdf4; border: 1.5px solid #bbf7d0; }
  .summary-bar.ng { background: #fef2f2; border: 1.5px solid #fecaca; }
  .summary-bar.warn { background: #fffbeb; border: 1.5px solid #fde68a; }
  .summary-icon { font-size: 28px; }
  .summary-title { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .summary-counts { font-size: 13px; color: #6b7280; display: flex; gap: 14px; }
  .c-ok { color: #22c55e; } .c-warn { color: #f59e0b; } .c-ng { color: #ef4444; }

  .item-card { padding: 14px 16px; border-radius: 10px; border: 1px solid #e5e7eb; background: #fff; margin-bottom: 10px; }
  .item-row { display: flex; align-items: flex-start; gap: 10px; }
  .item-icon { margin-top: 2px; flex-shrink: 0; }
  .item-status { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .item-img-label { font-size: 11px; color: #9ca3af; background: #f3f4f6; padding: 2px 8px; border-radius: 4px; }
  .item-instruction { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.5; }
  .item-detail { font-size: 13px; color: #6b7280; line-height: 1.6; }
  .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }

  .overall {
    margin-top: 16px; padding: 14px 16px; border-radius: 10px;
    background: #f9fafb; border: 1px solid #e5e7eb; font-size: 13px; color: #4b5563; line-height: 1.7;
  }
  .overall b { font-weight: 600; }
  .section { margin-bottom: 24px; }
  .section:last-of-type { margin-bottom: 28px; }
</style>
</head>
<body>

<!-- ============================= -->
<!-- ★ 設定エリア（この2つだけ変更） -->
<!-- ============================= -->
<script>
  // ★★★ ここにあなたのAPIキーを貼り付け ★★★
  const API_KEY = "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";

  // ★★★ ここにログインパスワードを設定 ★★★
  const LOGIN_PASSWORD = "bL7x#Kp9mW2qR!";
</script>
<!-- ============================= -->

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="brand">becky lash tokyo</div>
    <h1>修正チェックツール</h1>
    <p class="sub">パスワードを入力してログイン</p>
    <div class="login-error" id="loginError"></div>
    <input type="password" class="login-input" id="passwordInput" placeholder="パスワード" autofocus />
    <button class="login-btn" id="loginBtn">ログイン</button>
  </div>
</div>

<!-- MAIN SCREEN -->
<div class="main-screen" id="mainScreen">
  <div class="container">
    <div class="header">
      <button class="logout-btn" id="logoutBtn">ログアウト</button>
      <div class="header-brand">becky lash tokyo</div>
      <h1>修正チェックツール</h1>
      <p>修正指示と画像を照合し、修正漏れをチェックします</p>
    </div>

    <!-- Step 1 -->
    <div class="section">
      <div class="step-label"><span class="step-num">1</span>修正指示メッセージを貼り付け</div>
      <textarea class="message-input" id="messageInput" rows="8" placeholder="先方からの修正指示メッセージをそのまま貼り付けてください..."></textarea>
    </div>

    <!-- Step 2 -->
    <div class="section">
      <div class="step-label"><span class="step-num">2</span>修正済み画像をアップロード</div>
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">+</div>
        <div class="upload-text">クリックして画像を選択（複数可）</div>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />
      <div class="thumbs" id="thumbs"></div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="actions">
      <button class="btn-check" id="btnCheck">チェック開始</button>
      <button class="btn-reset" id="btnReset">リセット</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>画像を読み取り、修正内容を照合しています...</div>
      <div style="font-size:12px;margin-top:4px;color:#9ca3af">画像の枚数によって時間がかかる場合があります</div>
    </div>

    <div class="results" id="results">
      <div class="summary-bar" id="summaryBar">
        <div class="summary-icon" id="summaryIcon"></div>
        <div>
          <div class="summary-title" id="summaryTitle"></div>
          <div class="summary-counts" id="summaryCounts"></div>
        </div>
      </div>
      <div id="itemsList"></div>
      <div class="overall" id="overall" style="display:none"></div>
    </div>
  </div>
</div>

<script>
/* ---------- STATE ---------- */
const images = [];

/* ---------- LOGIN ---------- */
const loginScreen = document.getElementById('loginScreen');
const mainScreen = document.getElementById('mainScreen');
const passwordInput = document.getElementById('passwordInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const logoutBtn = document.getElementById('logoutBtn');

// Check if already logged in
if (sessionStorage.getItem('logged_in') === 'yes') {
  loginScreen.style.display = 'none';
  mainScreen.style.display = 'block';
}

loginBtn.addEventListener('click', doLogin);
passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const pw = passwordInput.value.trim();
  if (!pw) { showLoginError('パスワードを入力してください'); return; }
  if (pw !== LOGIN_PASSWORD) { showLoginError('パスワードが正しくありません'); return; }
  sessionStorage.setItem('logged_in', 'yes');
  loginScreen.style.display = 'none';
  mainScreen.style.display = 'block';
}

function showLoginError(msg) {
  loginError.textContent = msg;
  loginError.style.display = 'block';
}

logoutBtn.addEventListener('click', () => {
  sessionStorage.removeItem('logged_in');
  loginScreen.style.display = 'flex';
  mainScreen.style.display = 'none';
  passwordInput.value = '';
  loginError.style.display = 'none';
});

/* ---------- FILE UPLOAD ---------- */
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const thumbsEl = document.getElementById('thumbs');

uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', handleFiles);

function handleFiles(e) {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      images.push({ name: file.name, dataUrl: ev.target.result, base64: ev.target.result.split(',')[1], type: file.type });
      renderThumbs();
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
}

function renderThumbs() {
  thumbsEl.innerHTML = images.map((img, i) => `
    <div class="thumb-wrap">
      <img src="${img.dataUrl}" class="thumb-img" />
      <button class="thumb-remove" onclick="removeImage(${i})">×</button>
      <div class="thumb-label">${i + 1}枚目</div>
    </div>
  `).join('');
}

function removeImage(idx) { images.splice(idx, 1); renderThumbs(); }

/* ---------- SVG ICONS ---------- */
function svgCheck() {
  return '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="9" fill="#22c55e"/><path d="M5.5 9.5L7.5 11.5L12.5 6.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}
function svgWarn() {
  return '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="9" fill="#f59e0b"/><path d="M9 5.5V9.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="9" cy="12" r="1" fill="#fff"/></svg>';
}
function svgError() {
  return '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="9" fill="#ef4444"/><path d="M6 6L12 12M12 6L6 12" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>';
}

const statusMap = {
  ok: { icon: svgCheck, text: '修正OK', color: '#22c55e' },
  warning: { icon: svgWarn, text: '要確認', color: '#f59e0b' },
  ng: { icon: svgError, text: '未修正', color: '#ef4444' },
};

/* ---------- ERROR ---------- */
function showError(msg) { const el = document.getElementById('errorBox'); el.textContent = msg; el.style.display = 'block'; }
function hideError() { document.getElementById('errorBox').style.display = 'none'; }

/* ---------- CHECK ---------- */
document.getElementById('btnCheck').addEventListener('click', runCheck);
document.getElementById('btnReset').addEventListener('click', reset);

async function runCheck() {
  hideError();
  const message = document.getElementById('messageInput').value.trim();

  if (API_KEY === 'YOUR_API_KEY_HERE') { showError('APIキーが設定されていません。index.html 内の API_KEY を設定してください。'); return; }
  if (!message) { showError('修正指示メッセージを入力してください'); return; }
  if (images.length === 0) { showError('修正済み画像をアップロードしてください'); return; }

  const btn = document.getElementById('btnCheck');
  btn.disabled = true; btn.textContent = 'チェック中...';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  try {
    const imageContents = images.map(img => ({
      type: 'image',
      source: { type: 'base64', media_type: img.type || 'image/png', data: img.base64 },
    }));

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [...imageContents, {
            type: 'text',
            text: `あなたはInstagram運用コンテンツの修正チェック担当者です。

以下は、クライアントから届いた修正指示メッセージです：

---
${message}
---

上記の画像は修正済みの画像です。

【タスク】
1. 修正指示メッセージを読み取り、個別の修正項目をすべて抽出してください。
2. 各修正項目について、アップロードされた画像内のテキストや要素を確認し、修正が正しく反映されているか判定してください。
3. 以下のJSON形式のみで回答してください（他のテキストは一切不要）：

{
  "items": [
    {
      "instruction": "修正指示の内容",
      "status": "ok | warning | ng",
      "detail": "判定理由や確認結果の説明",
      "image_index": 0
    }
  ],
  "summary": "全体の総評（1〜2文）"
}

statusの基準：
- "ok": 修正が正しく反映されている
- "warning": 修正されているが、微妙な差異や確認が必要な点がある
- "ng": 修正が反映されていない、または誤りがある

画像が複数ある場合、image_indexで何枚目の画像に関する指摘かを示してください（0始まり）。
画像内のテキストを注意深く読み取り、誤字・脱字・表記ゆれも含めて厳密にチェックしてください。`,
          }],
        }],
      }),
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'API Error');

    const text = data.content.filter(c => c.type === 'text').map(c => c.text).join('');
    const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
    renderResults(parsed);
  } catch (err) {
    showError('チェック中にエラーが発生しました: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'チェック開始';
    document.getElementById('loading').style.display = 'none';
  }
}

function renderResults(data) {
  document.getElementById('results').style.display = 'block';

  const okCount = data.items.filter(i => i.status === 'ok').length;
  const warnCount = data.items.filter(i => i.status === 'warning').length;
  const ngCount = data.items.filter(i => i.status === 'ng').length;
  const allOk = data.items.length > 0 && ngCount === 0 && warnCount === 0;

  const bar = document.getElementById('summaryBar');
  bar.className = 'summary-bar ' + (allOk ? 'ok' : ngCount > 0 ? 'ng' : 'warn');
  document.getElementById('summaryIcon').textContent = allOk ? '✅' : ngCount > 0 ? '❌' : '⚠️';
  document.getElementById('summaryTitle').textContent = allOk
    ? 'すべての修正が反映されています！'
    : ngCount > 0 ? `${ngCount}件の修正漏れがあります` : `${warnCount}件の要確認項目があります`;
  document.getElementById('summaryCounts').innerHTML =
    `<span class="c-ok">OK: ${okCount}</span><span class="c-warn">要確認: ${warnCount}</span><span class="c-ng">未修正: ${ngCount}</span>`;

  document.getElementById('itemsList').innerHTML = data.items.map((item) => {
    const s = statusMap[item.status] || statusMap.warning;
    const imgLabel = images.length > 1 && item.image_index !== undefined
      ? `<span class="item-img-label">${item.image_index + 1}枚目</span>` : '';
    return `
      <div class="item-card">
        <div class="item-row">
          <div class="item-icon">${s.icon()}</div>
          <div style="flex:1">
            <div class="item-header">
              <span class="item-status" style="color:${s.color}">${s.text}</span>
              ${imgLabel}
            </div>
            <div class="item-instruction">${esc(item.instruction)}</div>
            <div class="item-detail">${esc(item.detail)}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  const overallEl = document.getElementById('overall');
  if (data.summary) {
    overallEl.style.display = 'block';
    overallEl.innerHTML = `<b>総評：</b>${esc(data.summary)}`;
  } else {
    overallEl.style.display = 'none';
  }
}

function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

function reset() {
  document.getElementById('messageInput').value = '';
  images.length = 0; renderThumbs(); hideError();
  document.getElementById('results').style.display = 'none';
  document.getElementById('loading').style.display = 'none';
}
</script>
</body>
</html>
