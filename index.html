/* ─── Phase Definitions ─── */
const PHASES = [
  { id: "material", label: "構成確認", color: "#7C6BF0", bg: "#F0EEFF" },
  { id: "production", label: "制作中", color: "#C98118", bg: "#FDF3E2" },
  { id: "draft", label: "初稿確認", color: "#E2622E", bg: "#FDF0EB" },
  { id: "draft_fb", label: "初稿FB", color: "#D4500A", bg: "#FDE8DE" },
  { id: "final", label: "最終確認", color: "#3B8FE3", bg: "#EAF3FD" },
  { id: "final_fb", label: "最終FB", color: "#2874C0", bg: "#E0EDFA" },
  { id: "delivered", label: "納品完了", color: "#18B07A", bg: "#E4F8F0" },
];
function phaseInfo(id) { return PHASES.find(p => p.id === id) || { label: "納品完了", color: "#18B07A", bg: "#E4F8F0" }; }
function phaseIndex(id) { return PHASES.findIndex(p => p.id === id); }
function phasePct(id) { return ({ material: 0, production: 15, draft: 30, draft_fb: 30, final: 60, final_fb: 60, delivered: 100 })[id] || 0; }
function cleanTitle(t) { return (t || "").replace(/【.*?】\s*/, ""); }

/* ─── CSV Parser ─── */
function parseCSV(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g, "").trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === "," && !inQ) { vals.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ""; });
    return obj;
  });
}

function derivePhaseFromRow(row) {
  // Q列 = TRUE → 納品完了
  const colQ = Object.values(row)[16] || ""; // Q = 17th column (index 16)
  if (colQ === "TRUE" || colQ === "true" || colQ === "True") return "delivered";
  // K列 = 完了 → 最終確認
  const colK = Object.values(row)[10] || ""; // K = 11th column (index 10)
  if (colK === "完了") return "final";
  // I列 = TRUE → 構成確認OK
  const colI = Object.values(row)[8] || ""; // I = 9th column (index 8)
  if (colI === "TRUE" || colI === "true" || colI === "True") {
    const colJ = Object.values(row)[9] || ""; // J = 10th column (index 9)
    return colJ === "完了" ? "draft" : "production";
  }
  return "material";
}

async function syncFromCSV(csvUrl) {
  if (!csvUrl || csvUrl.includes("CSV_URL_")) return null; // unconfigured = skip, use initial data
  // Try direct fetch first, then CORS proxy fallback
  let resp;
  try {
    resp = await fetch(csvUrl);
    if (!resp.ok) throw new Error("direct failed");
  } catch {
    // Fallback: use allorigins proxy
    const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(csvUrl);
    resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error("proxy also failed");
  }
  const text = await resp.text();
  const allRows = parseCSV(text);
  // Skip header rows (typically first 3 rows are headers), take data rows
  // Find rows that have a number in the first column
  const dataRows = allRows.filter(r => {
    const first = Object.values(r)[0] || "";
    return /^\d+$/.test(first.trim());
  });
  return dataRows.map(row => {
    const vals = Object.values(row);
    return {
      no: String(vals[0] || "").padStart(2, "0"),
      title: cleanTitle(vals[1] || ""),
      format: vals[2] || "フィード投稿",
      postDate: vals[3] || "",
      phase: derivePhaseFromRow(row),
      deliveryDate: vals[10] || "",
      driveUrl: "",
      history: [],
    };
  });
}

    { label: "制作中", ids: ["production"], color: "#C98118" },

    { label: "納品完了", ids: ["delivered"], color: "#18B07A" },

      ),
      React.createElement("div", { style: { position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" } },
        React.createElement("span", { style: { fontSize: 20, fontWeight: 600, color: "var(--text-primary)", lineHeight: 1 } }, pct, React.createElement("span", { style: { fontSize: 11, fontWeight: 400 } }, "%")),
        React.createElement("span", { style: { fontSize: 9, color: "var(--text-tertiary)", marginTop: 2 } }, `${done}/${total}`),
      ),
    ),
    React.createElement("div", { style: { flex: 1, display: "flex", flexDirection: "column", gap: 4 } },
      groups.map(g => {
        const cnt = posts.filter(p => g.ids.includes(p.phase)).length;
        return cnt > 0 ? React.createElement("div", { key: g.label, style: { display: "flex", alignItems: "center", gap: 6, fontSize: 11 } },

          ),
          React.createElement("span", { style: { fontWeight: 600, color: g.color, minWidth: 18, textAlign: "right" } }, cnt),
        ) : null;
      }),
    ),
  );
}

/* ─── Account Section ─── */
function AccountSection({ account }) {

  }, [account.csvUrl]);

        React.createElement("div", null,
          React.createElement("div", { style: { fontSize: 14, fontWeight: 700, color: "var(--text-primary)" } }, account.label),
          React.createElement("div", { style: { fontSize: 10, color: "var(--text-tertiary)", display: "flex", alignItems: "center", gap: 4 } },
            "月8投稿",
